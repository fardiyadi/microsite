<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sayang Aku Ga?</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins", sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
        radial-gradient(circle at top left, #ffd6ea, transparent 35%),
        radial-gradient(circle at bottom right, #ffb8da, transparent 35%),
        linear-gradient(135deg, #fff0f6, #ffd8ec);
    }

    .card{
      width:90%;
      max-width:720px;
      background:rgba(255,255,255,0.92);
      border:4px solid #ff5da8;
      border-radius:40px;
      padding:60px 30px;
      text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,0.12);
      position:relative;
    }

    h1{
      font-size:50px;
      color:#111;
      font-weight:800;
      margin-bottom:80px;
    }

    .button-area{
      position:relative;
      width:100%;
      height:320px;
    }

    button{
      width:190px;
      height:72px;
      border:none;
      border-radius:999px;
      font-size:24px;
      font-weight:700;
      cursor:pointer;
      transition:
        transform 0.25s ease,
        background 0.25s ease,
        box-shadow 0.25s ease;
      user-select:none;
    }

    /* BUTTON IYA */
    #yesBtn{
      position:absolute;
      left:18%;
      top:110px;
      background:#ff4f9b;
      color:white;
      box-shadow:0 12px 25px rgba(255,79,155,0.35);
    }

    #yesBtn:hover{
      background:#ff2e86;
    }

    /* BUTTON TIDAK */
    #noBtn{
      position:absolute;
      right:18%;
      top:110px;
      background:#111;
      color:white;
      box-shadow:0 12px 25px rgba(0,0,0,0.2);
    }

    .popup{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,0.95);
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:999;
      text-align:center;
      padding:20px;
    }

    .heart{
      font-size:90px;
      animation:pulse 1s infinite;
    }

    .popup h2{
      font-size:52px;
      color:#ff2e86;
      margin-top:20px;
    }

    .popup p{
      margin-top:10px;
      font-size:24px;
      font-weight:600;
      color:#111;
    }

    @keyframes pulse{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.2); }
      100%{ transform:scale(1); }
    }

    /* MOBILE */
    @media(max-width:700px){

      h1{
        font-size:38px;
        margin-bottom:60px;
      }

      .button-area{
        height:420px;
      }

      button{
        width:180px;
        height:68px;
        font-size:21px;
      }

      /* jadi atas bawah + ada gap */
      #yesBtn{
        left:50%;
        top:40px;
        transform:translateX(-50%);
      }

      #noBtn{
        left:50%;
        right:auto;
        top:170px;
        transform:translateX(-50%);
      }

      .popup h2{
        font-size:38px;
      }

      .popup p{
        font-size:20px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>Sayang aku ga? 🥺</h1>

    <div class="button-area">
      <button id="yesBtn">Iya dong 💖</button>
      <button id="noBtn">Tidak 😶</button>
    </div>

  </div>

  <div class="popup">
    <div class="heart">💖</div>
    <h2>Aku juga sayang kamu 😚</h2>
    <p>Udah tau jawabannya 😎</p>
  </div>

  <script>

    let scale = 1;

    function moveNoButton(){

      const area = $(".button-area");
      const btn = $("#noBtn");

      const maxX = area.width() - btn.outerWidth();
      const maxY = area.height() - btn.outerHeight();

      // posisi random
      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      btn.css({
        left: randomX + "px",
        top: randomY + "px",
        right:"auto",
        transform:"none"
      });

      // tombol iya membesar
      scale += 0.15;

      $("#yesBtn").css({
        transform:`scale(${scale})`
      });
    }

    // desktop hover
    $("#noBtn").on("mouseenter", function(){
      moveNoButton();
    });

    // mobile tap
    $("#noBtn").on("touchstart click", function(e){
      e.preventDefault();
      moveNoButton();
    });

    // klik iya
    $("#yesBtn").on("click", function(){
      $(".popup").fadeIn(300);
    });

  </script>

</body>
</html>
